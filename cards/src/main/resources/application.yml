spring:
  application:
    name: cards

  config:
    import: ${SPRING_CONFIG_IMPORT:configserver:http://localhost:8071}
eureka:
  instance:
    ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      default-zone : http://localhost/8761/eureka/

management:
  endpoint:
    shutdown:
      enable : true