spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:cards-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

build:
  version: "3.0"

cards:
  message: "Welcome to EazyBank cards related test APIs"
  contactDetails:
    name: "Test Developer"
    email: "test@eazybank.com"
  onCallSupport:
    - (000) 000-0000
